<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Consent — preview</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="consent.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>html,body{margin:0;background:#f0eee9}</style>
</head>
<body>
<div id="root" style="width:1280px;margin:0 auto;position:relative;"></div>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="ConsentScreen.jsx"></script>
<script type="text/babel">
  const params = new URLSearchParams(location.search);
  const view = params.get('v') || 'active';
  const props = {
    active:   { device:'desktop', status:'active',  mode:'full',     retention:'365', training:true },
    withdraw: { device:'desktop', status:'active',  mode:'full',     retention:'365', training:true, modal:'withdraw' },
    delete:   { device:'desktop', status:'active',  mode:'full',     retention:'365', training:true, modal:'delete' },
    changing: { device:'desktop', status:'active',  mode:'full',     retention:'365', training:true, pendingMode:'max' },
    partial:  { device:'desktop', status:'partial', mode:'balanced', retention:'90',  training:false, audit:DEFAULT_AUDIT.partial },
    mobile:   { device:'mobile',  status:'active',  mode:'full',     retention:'365', training:true },
  }[view];
  if (view === 'mobile') document.getElementById('root').style.width = '390px';
  ReactDOM.createRoot(document.getElementById('root')).render(<ConsentScreen {...props} />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
</script>
</body>
</html>
